version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: eternelle_backend
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
      - /app/venv # Prevent local venv from overwriting container env
    environment:
      - DEBUG=1

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: eternelle_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules # Anonymous volume to ensure npm install inside the container isn't overridden by local machine
    environment:
      - CHOKIDAR_USEPOLLING=true # Improves hot-reloading responsiveness inside Docker
    depends_on:
      - backend
